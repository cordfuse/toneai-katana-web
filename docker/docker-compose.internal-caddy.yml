# Chatframe — single-host compose for deployments where the host ALREADY runs a
# reverse proxy (Caddy / nginx / Traefik) attached to a shared docker network.
#
# Pattern matches a typical home-lab infra setup: a host-level Caddy container lives
# on `proxy_net` and routes <service>.linux.internal → <container>:<port>.
# Chatframe joins that same network and exposes nothing on the host — Caddy
# proxies by container name.
#
# Pre-flight:
#   1. Confirm `proxy_net` exists (`docker network ls`). It must be marked
#      external below since this compose doesn't create it.
#   2. Add a vhost to your host Caddyfile (see docker/Caddyfile in this
#      repo for the SSE-friendly block we ship). Reload Caddy after.
#   3. cp .env.example .env  →  fill in JWT_SECRET, ANTHROPIC_API_KEY, etc.
#   4. docker compose -f docker-compose.internal-caddy.yml up -d --build

services:
  chatframe:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: cordfuse/chatframe:dev
    container_name: chatframe
    restart: unless-stopped

    env_file:
      - .env

    environment:
      CHATFRAME_CONFIG_DIR: /app/config

      CHATFRAME_PROVIDER: ${CHATFRAME_PROVIDER:-anthropic}
      CHATFRAME_MODEL: ${CHATFRAME_MODEL:-claude-opus-4-8}
      CHATFRAME_SYSTEM_PROMPT: ${CHATFRAME_SYSTEM_PROMPT:-You are a helpful AI assistant.}
      CHATFRAME_TEMPERATURE: ${CHATFRAME_TEMPERATURE:-1.0}

      CHATFRAME_SHOW_SETTINGS:     ${CHATFRAME_SHOW_SETTINGS:-1}
      CHATFRAME_PERSIST_CHAT:      ${CHATFRAME_PERSIST_CHAT:-1}
      CHATFRAME_SHOW_WEB_SEARCH:   ${CHATFRAME_SHOW_WEB_SEARCH:-1}
      CHATFRAME_SHOW_MCP:          ${CHATFRAME_SHOW_MCP:-1}
      CHATFRAME_SHOW_MODEL_PICKER: ${CHATFRAME_SHOW_MODEL_PICKER:-1}
      CHATFRAME_SHOW_ATTACHMENTS:  ${CHATFRAME_SHOW_ATTACHMENTS:-1}

    volumes:
      # Same persistent config volume convention as the other compose files.
      - ../nodejs/config:/app/config

    # Local-only host port binding so tailscale serve (localhost:3008) can
    # reach the container while Caddy still fronts it via proxy_net. Safe
    # to remove for pure proxy-only setups.
    ports:
      - "3008:3000"

    networks:
      - proxy_net

networks:
  proxy_net:
    external: true   # created out-of-band by your host's reverse-proxy stack
