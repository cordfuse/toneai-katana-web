# ToneAI Kat — single-host compose for deployments where the host ALREADY runs a
# reverse proxy (Caddy / nginx / Traefik) attached to a shared docker network.
#
# Pattern matches a typical home-lab infra setup: a host-level Caddy container lives
# on `proxy_net` and routes <service>.linux.internal → <container>:<port>.
# ToneAI Kat joins that same network and exposes nothing on the host — Caddy
# proxies by container name.
#
# Pre-flight:
#   1. Confirm `proxy_net` exists (`docker network ls`). It must be marked
#      external below since this compose doesn't create it.
#   2. Add a vhost to your host Caddyfile (see docker/Caddyfile in this
#      repo for the SSE-friendly block we ship). Reload Caddy after.
#   3. cp .env.example .env  →  fill in JWT_SECRET, ANTHROPIC_API_KEY, etc.
#   4. docker compose -f docker-compose.internal-caddy.yml up -d --build

name: toneai-katana-web

services:
  toneai-kat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: cordfuse/toneai-katana-web:dev
    container_name: toneai-kat
    restart: unless-stopped

    env_file:
      - .env

    environment:
      TONEAI_CONFIG_DIR: /app/config
      TONEAI_MODEL: ${TONEAI_MODEL:-claude-sonnet-5}
      TONEAI_TEMPERATURE: ${TONEAI_TEMPERATURE:-1.0}

    volumes:
      # Operator config (branding/themes/icons), read from the host.
      - ../nodejs/config:/app/config
      # Writable, persistent home for the SQLite DB (auth/quota/logs).
      - toneai-kat-data:/app/data

    # No host port binding — the host reverse proxy reaches the app over
    # proxy_net by container name (see docker/Caddyfile). Add a `ports:` entry
    # only if you also want to hit it directly on a host port.
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true   # created out-of-band by your host's reverse-proxy stack

volumes:
  toneai-kat-data:
