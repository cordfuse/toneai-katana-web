# ToneAI Kat — production single-host compose, Caddy-fronted with auto-HTTPS.
#
# Caddy terminates TLS at the edge (uses Let's Encrypt for public domains
# automatically) and reverse-proxies to the app on a private compose network.
# The app itself is not exposed on a host port.
#
# Pre-flight:
#   1. Edit ./Caddyfile and replace YOUR_DOMAIN with your actual hostname.
#   2. cp .env.example .env  →  fill in JWT_SECRET, ANTHROPIC_API_KEY, etc.
#   3. docker compose -f docker-compose.prod.yml up -d --build
#   4. Caddy will provision a TLS cert on first request to your domain.

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: cordfuse/toneai-katana-web:prod
    container_name: toneai-kat
    restart: unless-stopped

    env_file:
      - .env

    environment:
      TONEAI_CONFIG_DIR: /app/config
      TONEAI_MODEL: ${TONEAI_MODEL:-claude-sonnet-5}
      TONEAI_TEMPERATURE: ${TONEAI_TEMPERATURE:-1.0}

    volumes:
      # Persistent config volume — same convention as the dev compose.
      # Point this at wherever the operator keeps ToneAI Kat's config on the host
      # (e.g. /srv/toneai-config:/app/config).
      - ../nodejs/config:/app/config

    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: toneai-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # ACME state, must persist for cert reuse
      - caddy-config:/config
    networks:
      - internal
    depends_on:
      - app

volumes:
  caddy-data:
  caddy-config:

networks:
  internal:
