# Build + publish multi-arch Docker images to GitHub Container Registry.
#
# Triggers:
#   - On `v*` tag push  → tags VERSION, VERSION-major, VERSION-major.minor, latest
#   - On `main` push    → tags edge (head-of-trunk)
#   - workflow_dispatch → manual run, same as main
#
# The `if: github.repository == 'cordfuse/chatframe'` guard prevents forks from
# running this workflow on their own dime — they'd push to their own
# ghcr.io/<fork>/chatframe anyway, which is their call to opt into.

name: Docker — publish

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}   # → cordfuse/chatframe

jobs:
  ghcr:
    if: github.repository == 'cordfuse/chatframe'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build + push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
