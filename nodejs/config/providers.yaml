# ToneAI-KATANA provider + model registry.
#
# This app is ANTHROPIC-ONLY. The multi-provider registry inherited from the
# chat-framework scaffold was removed on 2026-07-09 — see docs/settings.md § Providers and
# the free tier. Do not re-add OpenAI/Gemini/Bedrock/local entries here: the
# system prompt and tone-intent schema are tuned for Claude, and the free
# tier's quota accounting assumes a single upstream.
#
# Two modes, both server-side (the browser never calls Anthropic):
#   free  → the server's ANTHROPIC_API_KEY, subject to the global daily quota
#   byok  → a key supplied per-request by the user, quota untouched
#
# Edit this file (not lib/server/ai-tools.ts) when:
#   - Anthropic ships a new model and you want it in the picker
#   - a model is deprecated and you want it removed
#   - you want to relabel an entry
#
# The `anthropic` id maps to a constructor factory in
# `lib/server/ai-tools.ts`, so behavior stays in code while data lives here.
#
# Schema:
#   id              required, must match a factory key in ai-tools.ts
#   label           required, UI display name
#   category        required, "cloud" or "local"
#   envKey          cloud only — env var that must be set for `available: true`
#   defaultModel    required, must appear in `models[].id`
#   models          required, array of { id, label }
#
# Model IDs are complete as written — never append a date suffix
# (`claude-opus-4-8`, never `claude-opus-4-8-20260101`). A dated variant of a
# non-dated alias 404s.

providers:

  anthropic:
    label: Anthropic
    category: cloud
    envKey: ANTHROPIC_API_KEY
    # Sonnet 4.6, not Sonnet 5, is the default — a cost decision, not a
    # capability one. Sonnet 5 bills on a newer tokenizer that produces ~30%
    # more tokens for the same text, so once its introductory pricing ends
    # (2026-08-31) it costs ~25% more per unit of text than 4.6. Both support
    # the web-search tool's dynamic filtering, which is the lever that actually
    # governs this app's token bill. See docs/cost.md.
    defaultModel: claude-sonnet-4-6
    # OPERATOR options, not user options. The model is a server-side decision
    # (it spends the server's key on the free tier), so this list exists only to
    # validate TONEAI_MODEL — the client cannot choose from it. Opus is absent on
    # purpose: Sonnet is more than capable of tone design, and Opus costs 2.5x
    # Sonnet 5 per token for no gain here. Don't re-add it.
    models:
      - { id: claude-sonnet-4-6, label: Claude Sonnet 4.6 }
      - { id: claude-sonnet-5,   label: Claude Sonnet 5 }
      - { id: claude-haiku-4-5,  label: Claude Haiku 4.5 }
